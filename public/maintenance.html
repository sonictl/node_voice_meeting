<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>语音会议 - 维护中</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', monospace;
            background: #1e1e1e;
            color: #d4d4d4;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            background: #2d2d2d;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
            width: 500px;
            max-width: 95vw;
            text-align: center;
        }
        .icon {
            font-size: 64px;
            margin-bottom: 20px;
        }
        h1 {
            font-size: 22px;
            margin-bottom: 16px;
            color: #ffa500;
        }
        p {
            font-size: 15px;
            color: #888;
            line-height: 1.6;
        }
        .status-dot {
            display: inline-block;
            width: 10px;
            height: 10px;
            background: #d16969;
            border-radius: 50%;
            margin-right: 8px;
            animation: blink 1.5s ease-in-out infinite;
        }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
        .footer {
            margin-top: 24px;
            font-size: 12px;
            color: #555;
            border-top: 1px solid #3d3d3d;
            padding-top: 16px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">🔧</div>
        <h1><span class="status-dot"></span>语音会议服务维护中...</h1>
        <p>服务正在维护，暂时无法使用。<br>请稍后再试，或联系管理员。</p>
        <div class="footer">
            WebSocket + WebCodecs 多人语音会议系统
        </div>
    </div>
</body>
</html>
