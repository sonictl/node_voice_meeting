<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>语音会议 - 管理后台</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', monospace;
            background: #1e1e1e;
            color: #d4d4d4;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 20px;
        }
        .container {
            background: #2d2d2d;
            padding: 28px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
            width: 600px;
            max-width: 95vw;
        }
        h1 {
            font-size: 20px;
            text-align: center;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .badge {
            background: #d16969;
            padding: 3px 10px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: normal;
        }
        .badge-config {
            background: #4caf50;
            padding: 3px 10px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: normal;
        }
        .form-group {
            margin-bottom: 16px;
        }
        label {
            display: block;
            font-size: 13px;
            color: #888;
            margin-bottom: 6px;
        }
        input[type="password"] {
            width: 100%;
            background: #3d3d3d;
            color: #d4d4d4;
            border: 1px solid #555;
            border-radius: 4px;
            padding: 10px 12px;
            font-size: 14px;
            font-family: monospace;
        }
        input[type="password"]:focus {
            outline: none;
            border-color: #0e639c;
        }
        .btn-group {
            display: flex;
            gap: 8px;
            margin-top: 16px;
        }
        button {
            flex: 1;
            background: #0e639c;
            color: white;
            border: none;
            padding: 12px 20px;
            cursor: pointer;
            border-radius: 6px;
            font-size: 15px;
            transition: all 0.2s;
            font-weight: 500;
        }
        button:hover:not(:disabled) {
            background: #1177bb;
            transform: translateY(-1px);
        }
        button:disabled {
            background: #555;
            cursor: not-allowed;
            opacity: 0.6;
        }
        .btn-stop {
            background: #d16969;
        }
        .btn-stop:hover:not(:disabled) {
            background: #e07b7b;
        }
        .btn-start {
            background: #4caf50;
        }
        .btn-start:hover:not(:disabled) {
            background: #5cbf60;
        }
        .btn-logout {
            background: #888;
            font-size: 12px;
            padding: 6px 12px;
            flex: none;
        }
        .btn-logout:hover:not(:disabled) {
            background: #999;
        }
        .status-bar {
            background: #1e1e1e;
            padding: 14px;
            border-radius: 6px;
            margin: 12px 0;
            text-align: center;
            font-size: 15px;
            font-weight: bold;
        }
        .status-online {
            color: #4caf50;
        }
        .status-offline {
            color: #d16969;
        }
        .error-msg {
            color: #d16969;
            font-size: 13px;
            margin-top: 8px;
            text-align: center;
        }
        .success-msg {
            color: #4caf50;
            font-size: 13px;
            margin-top: 8px;
            text-align: center;
        }
        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            font-size: 13px;
            border-bottom: 1px solid #3d3d3d;
        }
        .info-row:last-child {
            border-bottom: none;
        }
        .info-label {
            color: #888;
        }
        .info-value {
            color: #d4d4d4;
            font-family: monospace;
        }
        .footer {
            text-align: center;
            font-size: 11px;
            color: #666;
            margin-top: 16px;
            border-top: 1px solid #3d3d3d;
            padding-top: 12px;
        }
        .hidden {
            display: none;
        }
        .login-section, .dashboard-section {
            transition: opacity 0.3s;
        }

        /* 编解码配置面板样式 */
        .config-section {
            background: #1e1e1e;
            border-radius: 6px;
            padding: 14px;
            margin: 12px 0;
        }
        .config-section h3 {
            font-size: 14px;
            color: #4caf50;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .config-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        .config-item {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .config-item label {
            font-size: 11px;
            color: #888;
            margin-bottom: 0;
        }
        .config-item select {
            background: #3d3d3d;
            color: #d4d4d4;
            border: 1px solid #555;
            border-radius: 4px;
            padding: 6px 8px;
            font-size: 12px;
            font-family: monospace;
        }
        .config-item select:focus {
            outline: none;
            border-color: #0e639c;
        }
        .config-presets {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 10px;
            align-items: center;
        }
        .preset-label {
            font-size: 11px;
            color: #888;
        }
        .preset-btn {
            flex: none;
            padding: 5px 10px;
            font-size: 11px;
            border-radius: 4px;
            background: #3d3d3d;
            color: #d4d4d4;
            border: 1px solid #555;
            cursor: pointer;
            transition: all 0.2s;
        }
        .preset-btn:hover {
            background: #4d4d4d;
            border-color: #0e639c;
        }
        .preset-btn.active {
            background: #0e639c;
            border-color: #0e639c;
            color: white;
        }
        .btn-apply-config {
            background: #4caf50;
            padding: 8px 16px;
            font-size: 13px;
            margin-top: 10px;
            width: 100%;
        }
        .btn-apply-config:hover {
            background: #5cbf60;
        }

        /* 审计日志样式 */
        .audit-section {
            background: #1e1e1e;
            border-radius: 6px;
            padding: 14px;
            margin: 12px 0;
        }
        .audit-section h3 {
            font-size: 14px;
            color: #d4d4d4;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .audit-log-list {
            max-height: 200px;
            overflow-y: auto;
            font-size: 11px;
            font-family: monospace;
        }
        .audit-log-list::-webkit-scrollbar {
            width: 6px;
        }
        .audit-log-list::-webkit-scrollbar-thumb {
            background: #555;
            border-radius: 3px;
        }
        .audit-entry {
            padding: 4px 0;
            border-bottom: 1px solid #333;
            color: #aaa;
        }
        .audit-entry:last-child {
            border-bottom: none;
        }
        .audit-entry .audit-time {
            color: #888;
        }
        .audit-entry .audit-action {
            color: #4caf50;
        }
        .audit-entry .audit-ip {
            color: #0e639c;
        }
        .btn-refresh-audit {
            background: #555;
            padding: 4px 10px;
            font-size: 11px;
            flex: none;
        }
        .btn-refresh-audit:hover {
            background: #666;
        }
        .audit-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>
            🔐 管理后台
            <span class="badge">管理员</span>
        </h1>

        <!-- 登录区域 -->
        <div id="loginSection" class="login-section">
            <div class="form-group">
                <label>管理员密码</label>
                <input type="password" id="passwordInput" placeholder="请输入管理员密码" onkeydown="if(event.key==='Enter') login()">
            </div>
            <button onclick="login()">🔑 验证身份</button>
            <div id="loginError" class="error-msg hidden"></div>
        </div>

        <!-- 管理面板 -->
        <div id="dashboardSection" class="dashboard-section hidden">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;">
                <span style="font-size:13px; color:#888;">管理控制台</span>
                <button class="btn-logout" onclick="logout()">🚪 退出登录</button>
            </div>

            <div class="status-bar" id="serviceStatusBar">
                <span id="serviceStatusText">检查中...</span>
            </div>

            <div class="info-row">
                <span class="info-label">服务地址</span>
                <span class="info-value" id="infoAddress">—</span>
            </div>
            <div class="info-row">
                <span class="info-label">活跃房间</span>
                <span class="info-value" id="infoRooms">—</span>
            </div>
            <div class="info-row">
                <span class="info-label">在线用户</span>
                <span class="info-value" id="infoPeers">—</span>
            </div>

            <!-- 编解码配置面板（管理员可配置） -->
            <div class="config-section">
                <h3>⚙️ 编解码配置 <span class="badge-config">管理员</span></h3>
                <div class="config-grid">
                    <div class="config-item">
                        <label>编解码采样率</label>
                        <select id="configSampleRate">
                            <option value="8000" selected>8 kHz（弱网）</option>
                            <option value="16000">16 kHz</option>
                            <option value="24000">24 kHz</option>
                            <option value="48000">48 kHz</option>
                        </select>
                    </div>
                    <div class="config-item">
                        <label>Opus 比特率</label>
                        <select id="configBitrate">
                            <option value="8000">8 kbps</option>
                            <option value="16000" selected>16 kbps（弱网）</option>
                            <option value="32000">32 kbps</option>
                            <option value="64000">64 kbps</option>
                        </select>
                    </div>
                    <div class="config-item">
                        <label>帧长</label>
                        <select id="configFrameDuration">
                            <option value="0.02">20 ms</option>
                            <option value="0.04">40 ms</option>
                            <option value="0.06" selected>60 ms（弱网）</option>
                            <option value="0.12">120 ms</option>
                        </select>
                    </div>
                    <div class="config-item">
                        <label>抖动缓冲</label>
                        <select id="configJitter">
                            <option value="2">2 帧</option>
                            <option value="4">4 帧</option>
                            <option value="6">6 帧</option>
                            <option value="8" selected>8 帧（弱网）</option>
                        </select>
                    </div>
                </div>
                <div class="config-presets">
                    <span class="preset-label">预设模式：</span>
                    <button class="preset-btn active" data-preset="weak-network">📡 弱网（默认）</button>
                    <button class="preset-btn" data-preset="balanced">⚖️ 均衡</button>
                    <button class="preset-btn" data-preset="high-quality">🎵 高清</button>
                    <button class="preset-btn" data-preset="low-latency">🚀 低延迟</button>
                </div>
                <button class="btn-apply-config" onclick="applyCodecConfig()">💾 应用配置到新会议</button>
                <div id="configMsg" class="success-msg hidden"></div>
            </div>

            <!-- 审计日志面板 -->
            <div class="audit-section">
                <div class="audit-header">
                    <h3>📋 操作审计日志</h3>
                    <button class="btn-refresh-audit" onclick="loadAuditLog()">🔄 刷新</button>
                </div>
                <div id="auditLogList" class="audit-log-list">
                    <span style="color:#666; font-size:12px;">加载中...</span>
                </div>
            </div>

            <div class="btn-group">
                <button id="stopBtn" class="btn-stop" onclick="stopService()">⏹️ 关闭服务</button>
                <button id="startBtn" class="btn-start hidden" onclick="startService()">▶️ 开启服务</button>
            </div>

            <div id="actionMsg" class="success-msg hidden"></div>
        </div>

        <div class="footer">
            WebSocket + WebCodecs 多人语音会议系统 · 弱网优化
        </div>
    </div>

    <script>
        let isAuthenticated = false;
        let statusInterval = null;
        let csrfToken = window.__CSRF_TOKEN__ || '';

        // 编解码配置预设
        const PRESETS = {
            'weak-network': { sampleRate: 8000, bitrate: 16000, frameDuration: 0.06, jitter: 8 },
            'balanced':     { sampleRate: 16000, bitrate: 32000, frameDuration: 0.04, jitter: 4 },
            'high-quality': { sampleRate: 48000, bitrate: 64000, frameDuration: 0.04, jitter: 2 },
            'low-latency':  { sampleRate: 48000, bitrate: 64000, frameDuration: 0.02, jitter: 2 }
        };

        /**
         * 获取 CSRF Token（从 Cookie 或 window 变量）
         */
        function getCsrfToken() {
            // 优先使用页面注入的 CSRF Token
            if (csrfToken) return csrfToken;
            
            // 尝试从 Cookie 获取
            const match = document.cookie.match(/(?:^|;\s*)X-CSRF-Token=([^;]*)/);
            if (match) {
                csrfToken = decodeURIComponent(match[1]);
                return csrfToken;
            }
            return '';
        }

        /**
         * 发送带认证的 API 请求
         */
        async function apiRequest(url, options = {}) {
            const method = options.method || 'GET';
            const body = options.body || null;
            
            const fetchOptions = {
                method,
                headers: {
                    'Content-Type': 'application/json'
                },
                credentials: 'same-origin' // 发送 Cookie
            };
            
            // 对 POST 请求添加 CSRF Token
            if (method === 'POST' && body) {
                const parsed = JSON.parse(body);
                parsed._csrf = getCsrfToken();
                fetchOptions.body = JSON.stringify(parsed);
            } else if (method === 'POST') {
                fetchOptions.body = JSON.stringify({ _csrf: getCsrfToken() });
            }
            
            const res = await fetch(url, fetchOptions);
            const data = await res.json();
            
            // 如果返回 401，说明 Session 过期，跳转到登录页
            if (res.status === 401) {
                isAuthenticated = false;
                document.getElementById('loginSection').classList.remove('hidden');
                document.getElementById('dashboardSection').classList.add('hidden');
                document.getElementById('loginError').textContent = '⏰ 会话已过期，请重新登录';
                document.getElementById('loginError').classList.remove('hidden');
                if (statusInterval) {
                    clearInterval(statusInterval);
                    statusInterval = null;
                }
                return null;
            }
            
            // 如果返回 429，说明被速率限制
            if (res.status === 429) {
                showActionMsg('⚠️ 请求过于频繁，请稍后再试');
                return null;
            }
            
            // 如果返回 403，说明 CSRF 验证失败
            if (res.status === 403) {
                showActionMsg('⚠️ CSRF 验证失败，请刷新页面重试');
                return null;
            }
            
            return data;
        }

        async function login() {
            const password = document.getElementById('passwordInput').value;
            const errorEl = document.getElementById('loginError');
            
            try {
                const res = await fetch('/admin/api/auth', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password }),
                    credentials: 'same-origin'
                });
                const data = await res.json();
                
                if (data.ok) {
                    // 保存 CSRF Token
                    if (data.csrfToken) {
                        csrfToken = data.csrfToken;
                    }
                    
                    isAuthenticated = true;
                    document.getElementById('loginSection').classList.add('hidden');
                    document.getElementById('dashboardSection').classList.remove('hidden');
                    errorEl.classList.add('hidden');
                    loadStatus();
                    loadCodecConfig();
                    loadAuditLog();
                    statusInterval = setInterval(loadStatus, 3000);
                    initPresetButtons();
                } else {
                    errorEl.textContent = '❌ 密码错误';
                    errorEl.classList.remove('hidden');
                }
            } catch (err) {
                errorEl.textContent = '❌ 连接失败: ' + err.message;
                errorEl.classList.remove('hidden');
            }
        }

        async function logout() {
            try {
                await apiRequest('/admin/api/logout', { method: 'POST' });
            } catch (err) {
                console.error('[Admin] Logout error:', err);
            }
            
            isAuthenticated = false;
            document.getElementById('loginSection').classList.remove('hidden');
            document.getElementById('dashboardSection').classList.add('hidden');
            if (statusInterval) {
                clearInterval(statusInterval);
                statusInterval = null;
            }
        }

        async function loadStatus() {
            const data = await apiRequest('/admin/api/status');
            if (!data) return;
            
            const statusText = document.getElementById('serviceStatusText');
            const statusBar = document.getElementById('serviceStatusBar');
            const stopBtn = document.getElementById('stopBtn');
            const startBtn = document.getElementById('startBtn');

            document.getElementById('infoAddress').textContent = data.address;
            document.getElementById('infoRooms').textContent = data.rooms;
            document.getElementById('infoPeers').textContent = data.peers;

            if (data.serviceOn) {
                statusText.textContent = '🟢 服务运行中';
                statusBar.className = 'status-bar status-online';
                stopBtn.classList.remove('hidden');
                startBtn.classList.add('hidden');
            } else {
                statusText.textContent = '🔴 服务已关闭';
                statusBar.className = 'status-bar status-offline';
                stopBtn.classList.add('hidden');
                startBtn.classList.remove('hidden');
            }
        }

        async function stopService() {
            if (!confirm('确定要关闭语音会议服务吗？所有在线用户将被断开。')) return;
            const data = await apiRequest('/admin/api/stop', { method: 'POST' });
            if (!data) return;
            showActionMsg(data.ok ? '✅ 服务已关闭' : '❌ ' + (data.message || '操作失败'));
            if (data.ok) {
                loadStatus();
                loadAuditLog();
            }
        }

        async function startService() {
            const data = await apiRequest('/admin/api/start', { method: 'POST' });
            if (!data) return;
            showActionMsg(data.ok ? '✅ 服务已开启' : '❌ ' + (data.message || '操作失败'));
            if (data.ok) {
                loadStatus();
                loadAuditLog();
            }
        }

        function showActionMsg(msg) {
            const el = document.getElementById('actionMsg');
            el.textContent = msg;
            el.classList.remove('hidden');
            setTimeout(() => el.classList.add('hidden'), 3000);
        }

        // ---- 编解码配置管理 ----

        async function loadCodecConfig() {
            const config = await apiRequest('/admin/api/codec-config');
            if (!config) return;
            
            if (config.sampleRate) {
                document.getElementById('configSampleRate').value = config.sampleRate;
            }
            if (config.opusBitrate) {
                document.getElementById('configBitrate').value = config.opusBitrate;
            }
            if (config.frameDuration) {
                document.getElementById('configFrameDuration').value = config.frameDuration;
            }
            if (config.jitterBufferFrames) {
                document.getElementById('configJitter').value = config.jitterBufferFrames;
            }

            // 匹配对应的预设模式并高亮
            for (const [name, preset] of Object.entries(PRESETS)) {
                if (preset.sampleRate === config.sampleRate &&
                    preset.bitrate === config.opusBitrate &&
                    preset.frameDuration === config.frameDuration &&
                    preset.jitter === config.jitterBufferFrames) {
                    document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
                    document.querySelector(`.preset-btn[data-preset="${name}"]`)?.classList.add('active');
                    break;
                }
            }

            console.log('[Admin] Loaded server config:', config);
        }

        function initPresetButtons() {
            document.querySelectorAll('.preset-btn').forEach(btn => {
                btn.addEventListener('click', () => applyPreset(btn.dataset.preset));
            });
        }

        function applyPreset(name) {
            const preset = PRESETS[name];
            if (!preset) return;

            document.getElementById('configSampleRate').value = preset.sampleRate;
            document.getElementById('configBitrate').value = preset.bitrate;
            document.getElementById('configFrameDuration').value = preset.frameDuration;
            document.getElementById('configJitter').value = preset.jitter;

            document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
            document.querySelector(`.preset-btn[data-preset="${name}"]`)?.classList.add('active');

            console.log('[Admin] Applied preset:', name, preset);
        }

        async function applyCodecConfig() {
            const config = {
                sampleRate: parseInt(document.getElementById('configSampleRate').value),
                opusBitrate: parseInt(document.getElementById('configBitrate').value),
                frameDuration: parseFloat(document.getElementById('configFrameDuration').value),
                jitterBufferFrames: parseInt(document.getElementById('configJitter').value)
            };

            const data = await apiRequest('/admin/api/codec-config', {
                method: 'POST',
                body: JSON.stringify(config)
            });
            if (!data) return;
            
            const msgEl = document.getElementById('configMsg');
            if (data.ok) {
                msgEl.textContent = '✅ 配置已更新，新会议将使用此配置';
                msgEl.className = 'success-msg';
                loadAuditLog();
            } else {
                msgEl.textContent = '❌ ' + (data.message || '配置失败');
                msgEl.className = 'error-msg';
            }
            msgEl.classList.remove('hidden');
            setTimeout(() => msgEl.classList.add('hidden'), 3000);
        }

        // ---- 审计日志 ----

        async function loadAuditLog() {
            const data = await apiRequest('/admin/api/audit-log');
            if (!data) return;
            
            const listEl = document.getElementById('auditLogList');
            if (!data.logs || data.logs.length === 0) {
                listEl.innerHTML = '<span style="color:#666; font-size:12px;">暂无操作日志</span>';
                return;
            }
            
            listEl.innerHTML = data.logs.map(entry => {
                const d = new Date(entry.timestamp);
                const date = d.toLocaleDateString('zh-CN', { month: '2-digit', day: '2-digit' });
                const time = d.toLocaleTimeString('zh-CN', { hour12: false });
                return `<div class="audit-entry">
                    <span class="audit-time">[${date} ${time}]</span>
                    <span class="audit-action">${escapeHtml(entry.action)}</span>
                    <span class="audit-ip">${escapeHtml(entry.ip)}</span>
                    ${entry.details ? `<span style="color:#888;">— ${escapeHtml(entry.details)}</span>` : ''}
                </div>`;
            }).join('');
            
            // 滚动到底部（最新日志）
            listEl.scrollTop = listEl.scrollHeight;
        }

        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }
    </script>
</body>
</html>
