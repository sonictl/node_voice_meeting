<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VoiceCall - WebSocket + WebCodecs</title>
    <link rel="stylesheet" href="style.css?v=2">
</head>
<body>
    <div class="container">
        <h1>
            🎙️ 多人语音通话
            <span class="badge">SFU ⚡</span>
            <span class="badge">WebCodecs 🚀</span>
        </h1>

        <div class="room-status-section">
            <h3>📡 通话状态</h3>
            <div id="roomStatus">
                <span class="room-status waiting">☎️ 未加入通话...</span>
            </div>
        </div>

        <div class="info">
            <span>🆔 我的 ID</span>
            <span class="id-value" id="myPeerId">—</span>
        </div>

        <!-- 在线成员列表 -->
        <div class="peers-section">
            <h3>👥 在线成员</h3>
            <div class="peers-list" id="peersList">
                <span style="color:#666; font-size:13px;">暂无其他成员</span>
            </div>
        </div>

        <!-- 编解码配置面板 -->
        <div class="config-section" id="configSection">
            <h3>⚙️ 编解码配置</h3>
            <div class="config-grid">
                <div class="config-item">
                    <label>采样率</label>
                    <select id="configSampleRate">
                        <option value="48000">48 kHz</option>
                        <option value="24000">24 kHz</option>
                        <option value="16000">16 kHz</option>
                        <option value="8000">8 kHz</option>
                    </select>
                </div>
                <div class="config-item">
                    <label>比特率</label>
                    <select id="configBitrate">
                        <option value="64000">64 kbps</option>
                        <option value="32000" selected>32 kbps</option>
                        <option value="16000">16 kbps</option>
                        <option value="8000">8 kbps</option>
                    </select>
                </div>
                <div class="config-item">
                    <label>帧长</label>
                    <select id="configFrameDuration">
                        <option value="0.02">20 ms</option>
                        <option value="0.04" selected>40 ms</option>
                        <option value="0.06">60 ms</option>
                        <option value="0.12">120 ms</option>
                    </select>
                </div>
                <div class="config-item">
                    <label>抖动缓冲</label>
                    <select id="configJitter">
                        <option value="2">2 帧</option>
                        <option value="4" selected>4 帧</option>
                        <option value="6">6 帧</option>
                        <option value="8">8 帧</option>
                    </select>
                </div>
            </div>
            <div class="config-presets">
                <span class="preset-label">预设模式：</span>
                <button class="preset-btn" data-preset="low-latency">🚀 低延迟</button>
                <button class="preset-btn" data-preset="balanced">⚖️ 均衡</button>
                <button class="preset-btn" data-preset="high-quality">🎵 高清</button>
                <button class="preset-btn" data-preset="weak-network">📡 弱网</button>
            </div>
        </div>

        <!-- 房间编解码配置显示 -->
        <div class="room-config-info" id="roomConfigInfo" style="display:none;">
            <h3>📋 房间编解码配置</h3>
            <div id="roomConfigDetails"></div>
        </div>

        <div class="status" id="status">⚡ 点击下方按钮加入语音通话</div>

        <div class="btn-group" id="mainBtnGroup">
            <button id="joinBtn">📞 加入通话</button>
            <button id="leaveBtn" disabled>❌ 退出通话</button>
            <button id="muteBtn" class="btn-mute" style="display:none;">🎤 麦克风开</button>
        </div>


        <div id="debugPanel">
            <h3>🔍 实时状态</h3>
            <div id="debugInfo">等待加入...</div>
        </div>

        <div class="footer-note">
            � WebSocket 直传 · Opus @ 32kbps · AudioWorklet · WebCodecs 编解码
            <br>浏览器原生 · 超低延迟
        </div>
    </div>
    <script src="client.js?v=2"></script>
</body>
</html>
