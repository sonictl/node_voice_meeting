<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voice - Meeting</title>
    <link rel="stylesheet" href="style.css?v=2">
</head>
<body>
    <div class="container">
        <h1>
            🎙️ 多人语音Meeting
            <span class="badge">SFU ⚡</span>
            <span class="badge">WebCodecs 🚀</span>
            <span class="badge weaknet">📡 </span>
        </h1>

        <div class="room-status-section">
            <h3>📡 通话状态</h3>
            <div id="roomStatus">
                <span class="room-status waiting">☎️ 未加入会议.</span>
            </div>
        </div>

        <div class="info">
            <span>🆔 我的 ID</span>
            <span class="id-value" id="myPeerId">—</span>
        </div>

        <!-- 在线成员列表 -->
        <div class="peers-section">
            <h3>👥 在线成员</h3>
            <div class="peers-list" id="peersList">
                <span style="color:#666; font-size:13px;">暂无其他成员</span>
            </div>
        </div>

        <!-- 固定编解码参数信息（只读） -->
        <div class="codec-info-section">
            <h3>📋 编解码参数</h3>
            <div class="codec-params">
                <div class="param-item">
                    <span class="param-label">采样率</span>
                    <span class="param-value">8 kHz</span>
                </div>
                <div class="param-item">
                    <span class="param-label">Opus 比特率</span>
                    <span class="param-value">16 kbps</span>
                </div>
                <div class="param-item">
                    <span class="param-label">帧长</span>
                    <span class="param-value">60 ms</span>
                </div>
                <div class="param-item">
                    <span class="param-label">抖动缓冲</span>
                    <span class="param-value">8 帧 (~480ms)</span>
                </div>
                <div class="param-item">
                    <span class="param-label">重采样</span>
                    <span class="param-value">48kHz ↔ 8kHz 线性插值</span>
                </div>
                <div class="param-item">
                    <span class="param-label">RMS 阈值</span>
                    <span class="param-value">0.015</span>
                </div>
            </div>
        </div>

        <div class="status" id="status">⚡ 点击下方按钮加入语音会议</div>

        <div class="btn-group" id="mainBtnGroup">
            <button id="joinBtn">📞 加入会议</button>
            <button id="leaveBtn" disabled>❌ 退出会议</button>
            <button id="muteBtn" class="btn-mute" style="display:none;">🎤 麦克风开</button>
        </div>

        <div id="debugPanel">
            <h3>🔍 实时状态信息</h3>
            <div id="debugInfo">等待加入...</div>
        </div>

        <div class="footer-note">
            📡 弱网优化 · AudioWorklet · WebCodecs · 线性插值重采样
            <br>👆如遇延迟，建议避开网络高峰期使用
        </div>
    </div>
    <script src="client.js?v=2"></script>
</body>
</html>
